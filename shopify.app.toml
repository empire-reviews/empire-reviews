# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "05be213c4c2c36c447c9d2532cbd900f"
name = "Empire Reviews Core"
application_url = "https://empire-reviews.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/app/orders_create"

  [[webhooks.subscriptions]]
  topics = [ "orders/fulfilled" ]
  uri = "/webhooks/app/orders_fulfilled"

  [[webhooks.subscriptions]]
  topics = [ "orders/updated" ]
  uri = "/webhooks/app/orders_updated"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,write_orders,write_products"
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://empire-reviews.vercel.app/auth/callback" ]

[app_proxy]
url = "https://empire-reviews.vercel.app"
subpath = "empire-reviews"
prefix = "apps"
